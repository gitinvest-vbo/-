<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    form {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    .success {
      color: #22c55e;
      text-align: center;
      margin-top: 10px;
    }

    .error {
      color: #ef4444;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<form id="form">
  <h2>Contact</h2>

  <input type="text" name="name" placeholder="Nom" required>
  <input type="email" name="email" placeholder="Email" required>
  <textarea name="message" placeholder="Message" rows="5" required></textarea>

  <input type="text" name="_gotcha" style="display:none">

  <button type="submit">Envoyer</button>

  <div id="status"></div>
</form>

<script>
  const form = document.getElementById("form");
  const status = document.getElementById("status");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = new FormData(form);

    try {
      const response = await fetch("https://formspree.io/f/xwvaobbd", {
        method: "POST",
        body: data,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        status.innerHTML = "<p class='success'>✅ Message envoyé !</p>";
        form.reset();
      } else {
        status.innerHTML = "<p class='error'>❌ Erreur, réessaie.</p>";
      }
    } catch (error) {
      status.innerHTML = "<p class='error'>❌ Problème réseau.</p>";
    }
  });
</script>

</body>
</html>
