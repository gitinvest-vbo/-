<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>DEMANDE - gitINVEST</title>

  <!-- Fonts tech -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    form {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    input[name="ticker"] {
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Orbitron', sans-serif;
    }

    button:hover {
      background: #2563eb;
    }

    .success {
      color: #22c55e;
      text-align: center;
      margin-top: 10px;
    }

    .error {
      color: #ef4444;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<form id="form">
  <h2>DEMANDE - gitINVEST</h2>

  <input type="text" name="name" placeholder="Nom" required>
  <input type="email" name="email" placeholder="Email" required>

  <input type="number" name="amount" placeholder="Montant à investir (€)" min="1" required>

  <input type="text" id="ticker" name="ticker" placeholder="Ticker (ex: BNP.PA)" required>

  <textarea name="message" placeholder="Votre demande..." rows="4"></textarea>

  <input type="text" name="_gotcha" style="display:none">

  <button type="submit">Envoyer</button>

  <div id="status"></div>
</form>

<script>
  const form = document.getElementById("form");
  const status = document.getElementById("status");
  const tickerInput = document.getElementById("ticker");

  // Auto MAJUSCULE en live
  tickerInput.addEventListener("input", function() {
    this.value = this.value.toUpperCase();
  });

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = new FormData(form);

    const amount = data.get("amount");
    if (amount <= 0) {
      status.innerHTML = "<p class='error'>❌ Montant invalide</p>";
      return;
    }

    try {
      const response = await fetch("https://formspree.io/f/xwvaobbd", {
        method: "POST",
        body: data,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        status.innerHTML = "<p class='success'>✅ Demande envoyée !</p>";
        form.reset();
      } else {
        status.innerHTML = "<p class='error'>❌ Erreur, réessaie.</p>";
      }
    } catch (error) {
      status.innerHTML = "<p class='error'>❌ Problème réseau.</p>";
    }
  });
</script>

</body>
</html>
